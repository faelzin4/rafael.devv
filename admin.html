<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso Admin · Mentoria Pro</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808; --surface: #111; --surface2: #1a1a1a;
      --accent: #c8f23b; --accent2: #2dffd4;
      --text: #f0ede6; --muted: #555; --border: rgba(255,255,255,0.07);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .icon { font-size: 2.5rem; text-align: center; display: block; margin-bottom: 20px; }
    h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; text-align: center; margin-bottom: 6px; }
    .sub { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 32px; }
    label { display: block; font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 20px; }
    input:focus { border-color: rgba(200,242,59,0.4); }
    input::placeholder { color: var(--muted); }
    button { display: block; width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 100px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; }
    button:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(200,242,59,0.3); }
    .erro { display: none; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25); border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: #f87171; text-align: center; margin-bottom: 16px; }
    .sucesso { display: none; background: rgba(45,255,212,0.08); border: 1px solid rgba(45,255,212,0.25); border-radius: 10px; padding: 12px 16px; font-size: 0.85rem; color: var(--accent2); text-align: center; margin-bottom: 16px; }
    .admin-badge { background: rgba(200,242,59,0.07); border: 1px solid rgba(200,242,59,0.15); color: var(--accent); padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 auto 24px; display: table; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🔑</span>
    <h1>Acesso Admin</h1>
    <p class="sub">Área restrita — somente para o criador do curso</p>
    <div class="admin-badge">✦ Mentoria Pro</div>
    <div class="erro" id="erroMsg">Senha incorreta. Tente novamente.</div>
    <div class="sucesso" id="sucessoMsg">✓ Acesso liberado! Redirecionando...</div>
    <label for="senha">Senha de acesso</label>
    <input type="password" id="senha" placeholder="Digite a senha..." autocomplete="current-password" onkeydown="if(event.key==='Enter') entrar()"/>
    <button onclick="entrar()">Acessar Mentoria →</button>
  </div>
  <script>
    function entrar() {
      const senha = document.getElementById('senha').value;
      const erroEl = document.getElementById('erroMsg');
      const sucessoEl = document.getElementById('sucessoMsg');
      erroEl.style.display = 'none';
      sucessoEl.style.display = 'none';
      if (senha !== 'pretinho123') {
        erroEl.style.display = 'block';
        document.getElementById('senha').value = '';
        document.getElementById('senha').focus();
        return;
      }
      const token = Math.random().toString(36).substring(2, 18) + Date.now().toString(36);
      const expiry = Date.now() + (24 * 60 * 60 * 1000);
      const hash = btoa(token + ':rafael2026');
      sessionStorage.setItem('mentoria_access', JSON.stringify({
        token, expiry, hash,
        nome: 'Rafael Admin',
        email: 'admin@rafael.dev',
        extras: { ob1: true, ob2: true, ob3: true },
        compradoEm: new Date().toISOString()
      }));
      sucessoEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'mentoria.html'; }, 1200);
    }
  </script>
</body>
</html>
